name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Debian package
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Find generated package
        id: package
        shell: bash
        run: |
          FILE=$(find output -maxdepth 1 -type f -name "*.deb" | head -n1)

          if [ -z "$FILE" ]; then
            echo "::error::No Debian package was generated."
            exit 1
          fi

          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$FILE")" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.name }}
          path: ${{ steps.package.outputs.file }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Komorebi ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.file }}
